<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a84ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#5e5ce6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bf5af2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1e;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.95"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="300" r="120" fill="white" opacity="0.05"/>
  <circle cx="900" cy="80" r="40" fill="white" opacity="0.08"/>

  <!-- Phone mockup -->
  <g transform="translate(800, 50)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="300" rx="30" fill="url(#card)" stroke="#48484a" stroke-width="2"/>
    <!-- notch -->
    <rect x="70" y="10" width="60" height="20" rx="10" fill="#000"/>
    <!-- screen content -->
    <rect x="20" y="50" width="160" height="60" rx="12" fill="#0a84ff" opacity="0.9"/>
    <text x="100" y="85" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">Rp 12.500.000</text>
    <text x="100" y="100" font-family="Inter, sans-serif" font-size="8" fill="white" opacity="0.7" text-anchor="middle">TOTAL PEMASUKAN</text>

    <rect x="20" y="125" width="75" height="40" rx="8" fill="#2c2c2e"/>
    <text x="58" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Device</text>

    <rect x="105" y="125" width="75" height="40" rx="8" fill="#2c2c2e"/>
    <text x="143" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Acc</text>

    <rect x="20" y="175" width="75" height="40" rx="8" fill="#2c2c2e"/>
    <text x="58" y="198" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Qoala</text>

    <rect x="105" y="175" width="75" height="40" rx="8" fill="#2c2c2e"/>
    <text x="143" y="198" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Tsel</text>

    <rect x="20" y="240" width="160" height="35" rx="10" fill="#0a84ff"/>
    <text x="100" y="262" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="white" text-anchor="middle">Simpan Data</text>
  </g>

  <!-- Title -->
  <text x="80" y="170" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="white">DIGIMAP</text>
  <text x="82" y="220" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="white" opacity="0.85">Roxy Square Jember</text>

  <!-- Tagline -->
  <text x="80" y="270" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="white" opacity="0.7">Aplikasi Pencatatan Penjualan Counter HP</text>
  <text x="80" y="290" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="white" opacity="0.7">iOS Style • Mobile-First • Firebase Powered</text>

  <!-- Badges -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="white" opacity="0.15"/>
    <text x="40" y="17" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">HTML5</text>

    <rect x="90" y="0" width="80" height="26" rx="13" fill="white" opacity="0.15"/>
    <text x="130" y="17" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">CSS3</text>

    <rect x="180" y="0" width="100" height="26" rx="13" fill="white" opacity="0.15"/>
    <text x="230" y="17" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">JavaScript</text>

    <rect x="290" y="0" width="90" height="26" rx="13" fill="#FFCA28"/>
    <text x="335" y="17" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#1c1c1e" text-anchor="middle">FIREBASE</text>
  </g>
</svg>
