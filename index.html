<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Digimap Roxy Square Jember</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      min-height: 100vh;
      color: #1e293b;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
    }
    .btn-black { background: #000; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn-black:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
    .animate-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .pin-box {
      width: 60px; height: 70px; text-align: center; font-size: 28px; font-weight: 900;
      border: 2px solid #e2e8f0; border-radius: 12px; background: #f8fafc;
      -moz-appearance: textfield; transition: all 0.2s;
    }
    .pin-box::-webkit-outer-spin-button, .pin-box::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .pin-box:focus { outline: none; border-color: #000; background: #fff; transform: scale(1.05); }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <!-- ============= VIEW: LOGIN ============= -->
  <div id="view_login" class="glass-card w-full max-w-md p-8 my-4 hidden">
    <div class="text-center mb-6">
      <div class="inline-block p-4 bg-black rounded-2xl mb-3">
        <i class="fas fa-store text-white text-3xl"></i>
      </div>
      <h2 class="text-2xl font-extrabold text-gray-800 tracking-tight">Digimap</h2>
      <p class="text-sm font-bold text-gray-500">Roxy Square Jember</p>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Pilih Nama</label>
        <div class="relative">
          <select id="login_nama" class="w-full p-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-black bg-gray-50 font-bold text-gray-700 cursor-pointer appearance-none transition-all">
            <option value="">-- Memuat... --</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
            <i class="fas fa-chevron-down"></i>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 text-center">Masukkan PIN</label>
        <div class="flex justify-center gap-3" id="pin_container">
          <input type="number" inputmode="numeric" maxlength="1" class="pin-box" data-idx="0">
          <input type="number" inputmode="numeric" maxlength="1" class="pin-box" data-idx="1">
          <input type="number" inputmode="numeric" maxlength="1" class="pin-box" data-idx="2">
          <input type="number" inputmode="numeric" maxlength="1" class="pin-box" data-idx="3">
        </div>
      </div>

      <button id="btn_login" onclick="doLogin()" class="w-full btn-black text-white font-black py-4 rounded-xl shadow-xl disabled:opacity-50 uppercase tracking-widest text-sm flex items-center justify-center gap-3">
        <span>Masuk</span><i class="fas fa-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- ============= VIEW: APP ============= -->
  <div id="view_app" class="glass-card w-full max-w-lg p-6 my-4 hidden">

    <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
      <div>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Selamat datang,</p>
        <p id="user_name" class="text-lg font-extrabold text-gray-800">-</p>
      </div>
      <button onclick="doLogout()" class="text-xs font-bold text-red-500 hover:text-red-700 transition-all px-3 py-2 rounded-lg hover:bg-red-50">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>

    <div class="flex gap-1 mb-6 p-1 bg-gray-100 rounded-2xl border border-gray-200 overflow-x-auto">
      <button id="nav_input" onclick="switchTab('input')" class="flex-1 py-3 px-2 text-[9px] font-black uppercase tracking-widest rounded-xl bg-slate-800 text-white shadow-md transition-all whitespace-nowrap">
        <i class="fas fa-edit"></i> Input
      </button>
      <button id="nav_history" onclick="switchTab('history')" class="flex-1 py-3 px-2 text-[9px] font-black uppercase tracking-widest rounded-xl text-gray-500 hover:text-slate-800 transition-all whitespace-nowrap">
        <i class="fas fa-history"></i> Histori
      </button>
      <button id="nav_rank" onclick="switchTab('rank')" class="flex-1 py-3 px-2 text-[9px] font-black uppercase tracking-widest rounded-xl text-gray-500 hover:text-slate-800 transition-all whitespace-nowrap">
        <i class="fas fa-trophy"></i> Rank
      </button>
      <button id="nav_chart" onclick="switchTab('chart')" class="flex-1 py-3 px-2 text-[9px] font-black uppercase tracking-widest rounded-xl text-gray-500 hover:text-slate-800 transition-all whitespace-nowrap">
        <i class="fas fa-chart-line"></i> Grafik
      </button>
    </div>

    <div id="view_input" class="animate-in">
      <div class="p-8 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 text-center">
        <i class="fas fa-hammer text-gray-400 text-4xl mb-3"></i>
        <p class="text-sm font-bold text-gray-600">Field input belum dikonfigurasi.</p>
        <p class="text-xs text-gray-400 mt-1">Akan ditambahkan satu per satu.</p>
      </div>
      <button id="btn_submit" onclick="submitForm()" class="mt-4 w-full btn-black text-white font-black py-4 rounded-xl shadow-xl disabled:opacity-50 uppercase tracking-widest text-sm flex items-center justify-center gap-3">
        <span>Tes Simpan</span><i class="fas fa-save"></i>
      </button>
    </div>

    <div id="view_history" class="hidden animate-in">
      <div class="flex justify-between items-center mb-4 px-1">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Histori</p>
        <select id="limit_history" onchange="loadHistory()" class="bg-gray-100 border border-gray-200 text-xs font-bold rounded-lg px-2 py-1 outline-none text-gray-700">
          <option value="20">20 Data</option>
          <option value="50">50 Data</option>
          <option value="100">100 Data</option>
        </select>
      </div>
      <div id="history_container" class="space-y-3 max-h-[60vh] overflow-y-auto pr-1">
        <p class="text-center text-gray-400 py-10"><i class="fas fa-spinner fa-spin text-2xl"></i></p>
      </div>
    </div>

    <div id="view_rank" class="hidden animate-in">
      <div class="p-8 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 text-center">
        <i class="fas fa-trophy text-gray-400 text-4xl mb-3"></i>
        <p class="text-sm font-bold text-gray-600">Leaderboard belum aktif.</p>
        <p class="text-xs text-gray-400 mt-1">Butuh field penjualan dulu.</p>
      </div>
    </div>

    <div id="view_chart" class="hidden animate-in">
      <div class="p-8 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 text-center">
        <i class="fas fa-chart-line text-gray-400 text-4xl mb-3"></i>
        <p class="text-sm font-bold text-gray-600">Grafik belum aktif.</p>
        <p class="text-xs text-gray-400 mt-1">Butuh field penjualan dulu.</p>
      </div>
    </div>
  </div>

  <script>
    // ====================================================================
    // PENTING: GANTI URL DI BAWAH DENGAN WEB APP URL APPS SCRIPT ANDA
    // Cara dapat: Apps Script → Deploy → New deployment → Web app → copy URL
    // ====================================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbzsTfWfWN3jvgcR1nJVhCRMVCWcvajj_bUzUIiHxJVvr_XAfuMFfhWzZrSg6p84_xsLZg/exec';

    const SESSION_KEY = 'digimap_session';

    // ===== HELPER FETCH =====
    async function api(action, payload = {}) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          // PENTING: tidak set Content-Type, biar tidak trigger preflight CORS
          body: JSON.stringify({ action, ...payload }),
          redirect: 'follow'
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (err) {
        throw new Error('Koneksi gagal: ' + err.message);
      }
    }

    // ===== ONLOAD =====
    window.onload = function() {
      const session = getSession();
      if (session && session.nama) {
        showApp(session.nama);
      } else {
        showLogin();
      }
    };

    // ===== SESSION =====
    function getSession() {
      try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { return null; }
    }
    function setSession(nama) {
      localStorage.setItem(SESSION_KEY, JSON.stringify({ nama: nama, loginAt: new Date().toISOString() }));
    }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    // ===== LOGIN =====
    function showLogin() {
      document.getElementById('view_app').classList.add('hidden');
      document.getElementById('view_login').classList.remove('hidden');
      loadMembers();
      setupPinInputs();
    }

    async function loadMembers() {
      const select = document.getElementById('login_nama');
      try {
        const data = await api('getMembers');
        select.innerHTML = '<option value="">-- Pilih Nama --</option>';
        data.forEach(nama => {
          const opt = document.createElement('option');
          opt.value = nama; opt.textContent = nama;
          select.appendChild(opt);
        });
      } catch (err) {
        Swal.fire('Error', 'Gagal load daftar anggota: ' + err.message, 'error');
      }
    }

    function setupPinInputs() {
      const boxes = document.querySelectorAll('.pin-box');
      boxes.forEach((box, i) => {
        box.value = '';
        box.oninput = function() {
          this.value = this.value.replace(/\D/g, '').slice(0, 1);
          if (this.value && i < boxes.length - 1) boxes[i + 1].focus();
        };
        box.onkeydown = function(e) {
          if (e.key === 'Backspace' && !this.value && i > 0) boxes[i - 1].focus();
          if (e.key === 'Enter') doLogin();
        };
      });
      setTimeout(() => boxes[0].focus(), 100);
    }

    function getPinValue() {
      return Array.from(document.querySelectorAll('.pin-box')).map(b => b.value).join('');
    }

    async function doLogin() {
      const nama = document.getElementById('login_nama').value;
      const pin = getPinValue();

      if (!nama) return Swal.fire('Oops!', 'Pilih nama dulu.', 'warning');
      if (pin.length !== 4) return Swal.fire('Oops!', 'PIN harus 4 digit.', 'warning');

      const btn = document.getElementById('btn_login');
      const ori = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memeriksa...';
      btn.disabled = true;

      try {
        const res = await api('validateLogin', { nama, pin });
        if (res.success) {
          setSession(res.nama);
          Swal.fire({
            title: 'Berhasil!', text: 'Selamat datang, ' + res.nama,
            icon: 'success', timer: 1200, showConfirmButton: false
          }).then(() => showApp(res.nama));
        } else {
          Swal.fire('Login Gagal', res.message, 'error');
          document.querySelectorAll('.pin-box').forEach(b => b.value = '');
          document.querySelectorAll('.pin-box')[0].focus();
        }
      } catch (err) {
        Swal.fire('Error', err.message, 'error');
      } finally {
        btn.innerHTML = ori; btn.disabled = false;
      }
    }

    // ===== APP =====
    function showApp(nama) {
      document.getElementById('view_login').classList.add('hidden');
      document.getElementById('view_app').classList.remove('hidden');
      document.getElementById('user_name').innerText = nama;
      switchTab('input');
    }

    function doLogout() {
      Swal.fire({
        title: 'Logout?', text: 'Yakin mau keluar?',
        icon: 'question', showCancelButton: true,
        confirmButtonText: 'Ya, Logout', cancelButtonText: 'Batal',
        confirmButtonColor: '#dc2626'
      }).then(res => {
        if (res.isConfirmed) {
          clearSession();
          showLogin();
        }
      });
    }

    // ===== TABS =====
    function switchTab(tabName) {
      const unselected = "flex-1 py-3 px-2 text-[9px] font-black uppercase tracking-widest rounded-xl text-gray-500 hover:text-slate-800 transition-all whitespace-nowrap";
      const selected   = "flex-1 py-3 px-2 text-[9px] font-black uppercase tracking-widest rounded-xl bg-slate-800 text-white shadow-md transition-all whitespace-nowrap";

      ['input', 'history', 'rank', 'chart'].forEach(t => {
        document.getElementById('view_' + t).classList.add('hidden');
        document.getElementById('nav_' + t).className = unselected;
      });
      document.getElementById('view_' + tabName).classList.remove('hidden');
      document.getElementById('nav_' + tabName).className = selected;

      if (tabName === 'history') loadHistory();
    }

    // ===== SUBMIT =====
    async function submitForm() {
      const session = getSession();
      if (!session) return doLogout();

      const btn = document.getElementById('btn_submit');
      const ori = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
      btn.disabled = true;

      try {
        const res = await api('submitData', { nama: session.nama });
        Swal.fire({ title: 'Berhasil!', text: res.message, icon: 'success', confirmButtonColor: '#000' });
      } catch (err) {
        Swal.fire('Error', err.message, 'error');
      } finally {
        btn.innerHTML = ori; btn.disabled = false;
      }
    }

    // ===== HISTORY =====
    async function loadHistory() {
      const limit = document.getElementById('limit_history').value;
      const container = document.getElementById('history_container');
      container.innerHTML = '<p class="text-center text-gray-400 py-10"><i class="fas fa-spinner fa-spin text-2xl"></i></p>';

      try {
        const res = await api('getHistory', { limit });
        let html = '';
        res.forEach(item => {
          html += `
          <div class="bg-gray-50 rounded-xl border border-gray-200 p-4">
            <div class="flex justify-between items-center">
              <div>
                <p class="text-sm font-extrabold text-gray-800">${item.staff}</p>
                <p class="text-[10px] text-gray-500 font-semibold">${item.tanggal} • ${item.waktu}</p>
              </div>
              <span class="text-[9px] font-black bg-gray-200 text-gray-600 px-2 py-1 rounded">BARIS ${item.row}</span>
            </div>
          </div>`;
        });
        if (!html) html = '<p class="text-center text-gray-500 text-sm py-4">Belum ada histori.</p>';
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<p class="text-center text-red-500 text-sm py-4">' + err.message + '</p>';
      }
    }
  </script>
</body>
</html>
