<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Digimap Roxy Square Jember</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    :root {
      --ios-bg: #000;
      --ios-card: rgba(28, 28, 30, 0.85);
      --ios-card-2: rgba(44, 44, 46, 0.7);
      --ios-border: rgba(84, 84, 88, 0.35);
      --ios-text: #fff;
      --ios-text-2: rgba(235, 235, 245, 0.6);
      --ios-text-3: rgba(235, 235, 245, 0.3);
      --ios-blue: #0a84ff;
      --ios-green: #30d158;
      --ios-orange: #ff9f0a;
      --ios-red: #ff453a;
      --ios-yellow: #ffd60a;
      --carbon: linear-gradient(135deg, #1a1a1a 0%, #2c2c2e 50%, #1a1a1a 100%);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      margin: 0; padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #000;
      color: var(--ios-text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(10, 132, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, rgba(255, 159, 10, 0.1) 0%, transparent 50%),
        #000;
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ===== APPLE LOGO ===== */
    .apple-logo {
      width: 60px; height: 60px;
      background: var(--carbon);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 
        0 8px 24px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }
    .apple-logo::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .apple-logo svg { width: 32px; height: 32px; fill: #f5f5f7; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }

    /* ===== GLASS CARD ===== */
    .glass {
      background: var(--ios-card);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--ios-border);
      border-radius: 24px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(10, 132, 255, 0.3); }
      50% { box-shadow: 0 0 30px rgba(10, 132, 255, 0.6); }
    }
    .animate-up { animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .animate-scale { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

    /* ===== HEADER LOGIN ===== */
    .login-wrapper {
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 20px 0;
    }
    .login-card {
      width: 100%;
      padding: 32px 24px;
      animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .login-header {
      text-align: center; margin-bottom: 32px;
    }
    .login-header .apple-logo {
      margin: 0 auto 16px;
    }
    .login-header h1 {
      margin: 0 0 4px;
      font-size: 28px; font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(180deg, #fff 0%, #c7c7cc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-header p {
      margin: 0; font-size: 13px; font-weight: 500;
      color: var(--ios-text-2); letter-spacing: 0.3px;
    }

    /* ===== INPUTS ===== */
    .label {
      display: block;
      font-size: 11px; font-weight: 700;
      color: var(--ios-text-2);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 8px;
    }
    .ios-select-wrap {
      position: relative;
    }
    .ios-select {
      width: 100%;
      padding: 14px 40px 14px 16px;
      background: var(--ios-card-2);
      border: 1px solid var(--ios-border);
      border-radius: 14px;
      color: var(--ios-text);
      font-family: inherit; font-size: 15px; font-weight: 600;
      appearance: none;
      outline: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .ios-select:focus { border-color: var(--ios-blue); background: rgba(10, 132, 255, 0.1); }
    .ios-select option { background: #1c1c1e; color: #fff; }
    .ios-select-arrow {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--ios-text-3); pointer-events: none;
      font-size: 12px;
    }

    /* ===== PIN INPUTS ===== */
    .pin-row {
      display: flex; justify-content: center; gap: 12px;
      margin-top: 12px;
    }
    .pin-box {
      width: 60px; height: 70px;
      text-align: center;
      font-size: 28px; font-weight: 700;
      color: var(--ios-text);
      background: var(--ios-card-2);
      border: 1.5px solid var(--ios-border);
      border-radius: 16px;
      outline: none;
      font-family: inherit;
      -moz-appearance: textfield;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .pin-box::-webkit-outer-spin-button,
    .pin-box::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .pin-box:focus {
      border-color: var(--ios-blue);
      background: rgba(10, 132, 255, 0.15);
      transform: scale(1.08);
      animation: pulseGlow 1.5s infinite;
    }

    /* ===== BUTTONS ===== */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--carbon);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: #fff;
      font-family: inherit;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      position: relative; overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .btn-primary:active:not(:disabled) {
      transform: scale(0.97);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== APP HEADER ===== */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 4px 20px;
    }
    .app-header-left {
      display: flex; align-items: center; gap: 12px;
    }
    .app-header-info p:first-child {
      margin: 0; font-size: 10px; font-weight: 700;
      color: var(--ios-text-3); text-transform: uppercase; letter-spacing: 1.5px;
    }
    .app-header-info p:last-child {
      margin: 2px 0 0; font-size: 17px; font-weight: 800;
      letter-spacing: -0.3px; color: var(--ios-text);
    }
    .logout-btn {
      background: rgba(255, 69, 58, 0.15);
      color: var(--ios-red);
      border: none;
      border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .logout-btn:active { transform: scale(0.92); background: rgba(255, 69, 58, 0.25); }

    /* ===== TAB BAR ===== */
    .tab-bar {
      display: flex; gap: 4px;
      padding: 4px;
      background: var(--ios-card-2);
      backdrop-filter: blur(20px);
      border: 1px solid var(--ios-border);
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1; padding: 10px 4px;
      background: transparent; border: none;
      color: var(--ios-text-2);
      font-family: inherit;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .tab-btn i { font-size: 16px; }
    .tab-btn.active {
      background: var(--carbon);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    /* ===== INPUT FIELD GRID ===== */
    .field-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .field {
      background: var(--ios-card-2);
      border: 1px solid var(--ios-border);
      border-radius: 14px;
      padding: 12px 14px;
      transition: all 0.2s;
    }
    .field:focus-within { border-color: var(--ios-blue); background: rgba(10, 132, 255, 0.08); }
    .field-label {
      font-size: 10px; font-weight: 700;
      color: var(--ios-text-3);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .field-input-wrap {
      display: flex; align-items: center; gap: 6px; margin-top: 4px;
    }
    .field-input-wrap .prefix {
      color: var(--ios-text-3); font-size: 13px; font-weight: 700;
    }
    .field-input-wrap input {
      flex: 1; width: 100%;
      background: transparent; border: none; outline: none;
      color: var(--ios-text);
      font-family: inherit;
      font-size: 16px; font-weight: 700;
      text-align: right;
      padding: 0;
    }
    .field-input-wrap input::placeholder { color: var(--ios-text-3); font-weight: 500; }

    .field.airpods {
      grid-column: span 2;
      background: linear-gradient(135deg, rgba(255, 159, 10, 0.15) 0%, rgba(255, 159, 10, 0.05) 100%);
      border-color: rgba(255, 159, 10, 0.3);
    }
    .field.airpods .field-label { color: var(--ios-orange); }
    .field.airpods .field-input-wrap input { text-align: left; }

    /* ===== TOTAL DISPLAY ===== */
    .total-display {
      margin-top: 12px;
      padding: 18px 20px;
      background: var(--carbon);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      position: relative; overflow: hidden;
    }
    .total-display::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 3s infinite;
    }
    .total-display .label-total {
      font-size: 10px; font-weight: 700;
      color: var(--ios-text-3); text-transform: uppercase; letter-spacing: 1.5px;
    }
    .total-display .total-value {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(180deg, #fff 0%, #c7c7cc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== HISTORY ===== */
    .history-toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .history-toolbar .hint {
      flex: 1; font-size: 10px; font-weight: 600;
      color: var(--ios-text-3); text-transform: uppercase; letter-spacing: 1px;
    }
    .btn-export {
      background: linear-gradient(135deg, #30d158 0%, #248a3d 100%);
      color: #fff; border: none;
      padding: 8px 14px; border-radius: 10px;
      font-family: inherit;
      font-size: 11px; font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .btn-export:active { transform: scale(0.95); }
    .limit-select {
      background: var(--ios-card-2);
      color: var(--ios-text);
      border: 1px solid var(--ios-border);
      border-radius: 10px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 11px; font-weight: 600;
      outline: none;
    }
    .limit-select option { background: #1c1c1e; }

    .history-list {
      display: flex; flex-direction: column; gap: 10px;
      max-height: 60vh; overflow-y: auto;
      padding-right: 4px;
    }
    .history-card {
      padding: 14px;
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .history-card-head {
      display: flex; justify-content: space-between; align-items: end;
      border-bottom: 1px solid var(--ios-border);
      padding-bottom: 8px; margin-bottom: 10px;
    }
    .history-card-head .name { font-size: 14px; font-weight: 800; margin: 0; }
    .history-card-head .meta { font-size: 11px; font-weight: 600; color: var(--ios-text-3); margin: 2px 0 0; }
    .history-card-head .id-tag {
      font-size: 9px; font-weight: 800;
      background: var(--ios-card-2);
      color: var(--ios-text-2);
      padding: 4px 8px; border-radius: 6px;
    }
    .history-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      font-size: 12px; font-weight: 600;
    }
    .history-item {
      display: flex; justify-content: space-between;
      padding: 6px 8px; border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .history-item:active { background: rgba(255, 255, 255, 0.05); }
    .history-item .key { color: var(--ios-text-3); }
    .history-item .value { color: var(--ios-blue); display: flex; align-items: center; gap: 4px; }
    .history-item.airpods { grid-column: span 2; background: rgba(255, 159, 10, 0.1); margin-top: 4px; }
    .history-item.airpods .key, .history-item.airpods .value { color: var(--ios-orange); }

    /* ===== RANK ===== */
    .rank-list { display: flex; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; }
    .rank-card {
      padding: 14px;
      display: flex; align-items: center; gap: 12px;
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .rank-badge {
      width: 36px; text-align: center;
      font-size: 18px; font-weight: 800;
    }
    .rank-badge .fa-medal { font-size: 22px; }
    .rank-info { flex: 1; border-left: 2px solid var(--ios-border); padding-left: 12px; }
    .rank-info .name { font-size: 14px; font-weight: 800; margin: 0; }
    .rank-info .sub { font-size: 11px; font-weight: 600; color: var(--ios-orange); margin: 2px 0 0; }
    .rank-total { text-align: right; }
    .rank-total .l { font-size: 9px; font-weight: 700; color: var(--ios-text-3); text-transform: uppercase; letter-spacing: 1px; }
    .rank-total .v { font-size: 14px; font-weight: 800; color: var(--ios-blue); }

    /* ===== CHART ===== */
    .chart-card { padding: 16px; }
    .chart-card h2 { margin: 0 0 16px; font-size: 13px; font-weight: 700; text-align: center; color: var(--ios-text-2); }

    /* ===== SCROLLBAR ===== */
    *::-webkit-scrollbar { width: 4px; }
    *::-webkit-scrollbar-thumb { background: var(--ios-border); border-radius: 4px; }

    /* ===== UTIL ===== */
    .hidden { display: none !important; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--ios-text-3); font-size: 13px; }
    .loading { text-align: center; padding: 40px 20px; color: var(--ios-text-3); font-size: 22px; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="view_login" class="container login-wrapper hidden">
    <div class="login-card glass">
      <div class="login-header">
        <div class="apple-logo">
          <svg viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        </div>
        <h1>Digimap</h1>
        <p>Roxy Square Jember</p>
      </div>
      <div style="display:flex; flex-direction:column; gap: 24px;">
        <div>
          <label class="label">Pilih Nama</label>
          <div class="ios-select-wrap">
            <select id="login_nama" class="ios-select">
              <option value="">-- Memuat... --</option>
            </select>
            <i class="fas fa-chevron-down ios-select-arrow"></i>
          </div>
        </div>
        <div>
          <label class="label" style="text-align:center">Masukkan PIN</label>
          <div class="pin-row">
            <input type="number" inputmode="numeric" maxlength="1" class="pin-box">
            <input type="number" inputmode="numeric" maxlength="1" class="pin-box">
            <input type="number" inputmode="numeric" maxlength="1" class="pin-box">
            <input type="number" inputmode="numeric" maxlength="1" class="pin-box">
          </div>
        </div>
        <button id="btn_login" class="btn-primary">
          <span>Masuk</span><i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="view_app" class="container hidden">
    <div class="app-header animate-up">
      <div class="app-header-left">
        <div class="apple-logo" style="width:44px; height:44px; border-radius:12px;">
          <svg viewBox="0 0 24 24" style="width:22px; height:22px;"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="#f5f5f7"/></svg>
        </div>
        <div class="app-header-info">
          <p>Selamat datang,</p>
          <p id="user_name">-</p>
        </div>
      </div>
      <button id="btn_logout" class="logout-btn"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="tab-bar animate-up">
      <button data-tab="input" class="tab-btn active"><i class="fas fa-edit"></i><span>Input</span></button>
      <button data-tab="history" class="tab-btn"><i class="fas fa-clock-rotate-left"></i><span>Histori</span></button>
      <button data-tab="rank" class="tab-btn"><i class="fas fa-ranking-star"></i><span>Rank</span></button>
      <button data-tab="chart" class="tab-btn"><i class="fas fa-chart-column"></i><span>Grafik</span></button>
    </div>

    <!-- INPUT -->
    <div id="view_input" class="animate-up">
      <div class="field-grid">
        <div class="field"><div class="field-label">Device</div><div class="field-input-wrap"><span class="prefix">Rp</span><input type="text" id="val_device" class="uang-input" placeholder="0"></div></div>
        <div class="field"><div class="field-label">Accessories</div><div class="field-input-wrap"><span class="prefix">Rp</span><input type="text" id="val_accessories" class="uang-input" placeholder="0"></div></div>
        <div class="field"><div class="field-label">Qoala</div><div class="field-input-wrap"><span class="prefix">Rp</span><input type="text" id="val_qoala" class="uang-input" placeholder="0"></div></div>
        <div class="field"><div class="field-label">Telkomsel</div><div class="field-input-wrap"><span class="prefix">Rp</span><input type="text" id="val_telkomsel" class="uang-input" placeholder="0"></div></div>
        <div class="field"><div class="field-label">Indosat</div><div class="field-input-wrap"><span class="prefix">Rp</span><input type="text" id="val_indosat" class="uang-input" placeholder="0"></div></div>
        <div class="field"><div class="field-label">XL</div><div class="field-input-wrap"><span class="prefix">Rp</span><input type="text" id="val_xl" class="uang-input" placeholder="0"></div></div>
        <div class="field airpods"><div class="field-label"><i class="fas fa-headphones"></i> Airpods (Qty)</div><div class="field-input-wrap"><input type="number" id="val_airpods" placeholder="Jumlah unit"></div></div>
      </div>

      <div class="total-display">
        <span class="label-total">Total Pemasukan</span>
        <span id="total_display" class="total-value">Rp 0</span>
      </div>

      <button id="btn_submit" class="btn-primary" style="margin-top:16px;">
        <span>Simpan Data</span><i class="fas fa-cloud-arrow-up"></i>
      </button>
    </div>

    <!-- HISTORY -->
    <div id="view_history" class="hidden animate-up">
      <div class="history-toolbar">
        <span class="hint">Ketuk untuk edit</span>
        <button id="btn_export" class="btn-export"><i class="fas fa-file-excel"></i> Export</button>
        <select id="limit_history" class="limit-select">
          <option value="20">20</option><option value="50">50</option><option value="100">100</option><option value="500">500</option>
        </select>
      </div>
      <div id="history_container" class="history-list">
        <div class="loading"><i class="fas fa-circle-notch fa-spin"></i></div>
      </div>
    </div>

    <!-- RANK -->
    <div id="view_rank" class="hidden animate-up">
      <div id="rank_container" class="rank-list">
        <div class="loading"><i class="fas fa-circle-notch fa-spin"></i></div>
      </div>
    </div>

    <!-- CHART -->
    <div id="view_chart" class="hidden animate-up">
      <div class="chart-card glass">
        <h2>Penjualan Bulanan (Rp)</h2>
        <canvas id="monthlyChart"></canvas>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, push, update, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC6PoHGLzZZKix8E8y2YVU6c8nThuGInAY",
      authDomain: "digimap-roxy-square-jember.firebaseapp.com",
      databaseURL: "https://digimap-roxy-square-jember-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "digimap-roxy-square-jember",
      storageBucket: "digimap-roxy-square-jember.firebasestorage.app",
      messagingSenderId: "901305100636",
      appId: "1:901305100636:web:88332450725205cb217999"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const SESSION_KEY = 'digimap_session';
    let myChart = null;
    const formatRp = (n) => new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0 }).format(n);

    // iOS-style SweetAlert preset
    const swalDark = {
      background: '#1c1c1e', color: '#fff',
      confirmButtonColor: '#0a84ff', cancelButtonColor: '#3a3a3c',
      customClass: { popup: 'swal2-ios' }
    };

    function getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { return null; } }
    function setSession(nama) { localStorage.setItem(SESSION_KEY, JSON.stringify({ nama, loginAt: Date.now() })); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    const session = getSession();
    if (session && session.nama) showApp(session.nama); else showLogin();

    function showLogin() {
      document.getElementById('view_app').classList.add('hidden');
      document.getElementById('view_login').classList.remove('hidden');
      loadMembers();
      setupPinInputs();
    }

    async function loadMembers() {
      const select = document.getElementById('login_nama');
      try {
        const snap = await get(ref(db, 'members'));
        select.innerHTML = '<option value="">-- Pilih Nama --</option>';
        if (snap.exists()) {
          Object.keys(snap.val()).sort().forEach(nama => {
            const o = document.createElement('option');
            o.value = nama; o.textContent = nama;
            select.appendChild(o);
          });
        }
      } catch (err) { Swal.fire({ ...swalDark, title: 'Error', text: err.message, icon: 'error' }); }
    }

    function setupPinInputs() {
      const boxes = document.querySelectorAll('.pin-box');
      boxes.forEach((box, i) => {
        box.value = '';
        box.oninput = function() {
          this.value = this.value.replace(/\D/g, '').slice(0, 1);
          if (this.value && i < boxes.length - 1) boxes[i + 1].focus();
        };
        box.onkeydown = function(e) {
          if (e.key === 'Backspace' && !this.value && i > 0) boxes[i - 1].focus();
          if (e.key === 'Enter') doLogin();
        };
      });
      setTimeout(() => boxes[0].focus(), 200);
    }

    function getPinValue() {
      return Array.from(document.querySelectorAll('.pin-box')).map(b => b.value).join('');
    }

    async function doLogin() {
      const nama = document.getElementById('login_nama').value;
      const pin = getPinValue();
      if (!nama) return Swal.fire({ ...swalDark, title: 'Oops', text: 'Pilih nama dulu.', icon: 'warning' });
      if (!/^\d{4}$/.test(pin)) return Swal.fire({ ...swalDark, title: 'Oops', text: 'PIN harus 4 digit.', icon: 'warning' });

      const btn = document.getElementById('btn_login');
      const ori = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Memeriksa...'; btn.disabled = true;
      try {
        const snap = await get(ref(db, `members/${nama}`));
        if (!snap.exists()) {
          Swal.fire({ ...swalDark, title: 'Login Gagal', text: 'Nama tidak ditemukan.', icon: 'error' });
        } else if (snap.val().pin !== pin) {
          Swal.fire({ ...swalDark, title: 'Login Gagal', text: 'PIN salah.', icon: 'error' });
          document.querySelectorAll('.pin-box').forEach(b => b.value = '');
          document.querySelectorAll('.pin-box')[0].focus();
        } else {
          setSession(nama);
          Swal.fire({ ...swalDark, title: 'Berhasil!', text: 'Hi, ' + nama, icon: 'success', timer: 1000, showConfirmButton: false })
            .then(() => showApp(nama));
        }
      } catch (err) { Swal.fire({ ...swalDark, title: 'Error', text: err.message, icon: 'error' }); }
      finally { btn.innerHTML = ori; btn.disabled = false; }
    }

    function showApp(nama) {
      document.getElementById('view_login').classList.add('hidden');
      document.getElementById('view_app').classList.remove('hidden');
      document.getElementById('user_name').innerText = nama;
      setupUangInputs();
      switchTab('input');
    }

    function doLogout() {
      Swal.fire({ ...swalDark, title: 'Logout?', text: 'Yakin mau keluar?', icon: 'question', showCancelButton: true, confirmButtonText: 'Ya, Logout', cancelButtonText: 'Batal', confirmButtonColor: '#ff453a' })
        .then(res => { if (res.isConfirmed) { clearSession(); showLogin(); } });
    }

    function switchTab(tab) {
      ['input','history','rank','chart'].forEach(t => document.getElementById('view_' + t).classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('view_' + tab).classList.remove('hidden');
      document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
      if (tab === 'history') loadHistory();
      if (tab === 'rank') loadRank();
      if (tab === 'chart') loadChart();
    }

    function setupUangInputs() {
      document.querySelectorAll('.uang-input').forEach(input => {
        input.oninput = function() {
          let v = this.value.replace(/[^,\d]/g, '');
          this.value = v ? parseInt(v, 10).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") : "";
          hitungTotal();
        };
      });
    }

    function cleanNumber(str) { return str ? Number(str.replace(/\./g, '')) : 0; }
    function hitungTotal() {
      const t = cleanNumber(document.getElementById('val_device').value)
              + cleanNumber(document.getElementById('val_accessories').value)
              + cleanNumber(document.getElementById('val_qoala').value)
              + cleanNumber(document.getElementById('val_telkomsel').value)
              + cleanNumber(document.getElementById('val_indosat').value)
              + cleanNumber(document.getElementById('val_xl').value);
      document.getElementById('total_display').innerText = 'Rp ' + formatRp(t);
    }

    async function submitForm() {
      const session = getSession();
      if (!session) return doLogout();
      const btn = document.getElementById('btn_submit');
      const ori = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Menyimpan...'; btn.disabled = true;

      const now = new Date();
      const payload = {
        nama: session.nama,
        tanggal: now.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }),
        waktu: now.toLocaleTimeString('id-ID', { hour12: false }),
        timestamp: now.getTime(),
        device: cleanNumber(document.getElementById('val_device').value),
        acc: cleanNumber(document.getElementById('val_accessories').value),
        qoala: cleanNumber(document.getElementById('val_qoala').value),
        tsel: cleanNumber(document.getElementById('val_telkomsel').value),
        isat: cleanNumber(document.getElementById('val_indosat').value),
        xl: cleanNumber(document.getElementById('val_xl').value),
        airpods: Number(document.getElementById('val_airpods').value) || 0
      };

      try {
        await push(ref(db, 'sales'), payload);
        Swal.fire({ ...swalDark, title: 'Berhasil!', text: 'Data tersimpan.', icon: 'success', timer: 1200, showConfirmButton: false });
        document.querySelectorAll('.uang-input').forEach(i => i.value = '');
        document.getElementById('val_airpods').value = '';
        hitungTotal();
      } catch (err) { Swal.fire({ ...swalDark, title: 'Error', text: err.message, icon: 'error' }); }
      finally { btn.innerHTML = ori; btn.disabled = false; }
    }

    async function loadHistory() {
      const limit = parseInt(document.getElementById('limit_history').value, 10);
      const c = document.getElementById('history_container');
      c.innerHTML = '<div class="loading"><i class="fas fa-circle-notch fa-spin"></i></div>';
      try {
        const q = query(ref(db, 'sales'), orderByChild('timestamp'), limitToLast(limit));
        const snap = await get(q);
        if (!snap.exists()) { c.innerHTML = '<div class="empty-state">Belum ada histori.</div>'; return; }
        const items = [];
        snap.forEach(child => { items.push({ id: child.key, ...child.val() }); });
        items.reverse();

        let html = '';
        items.forEach(item => {
          html += `<div class="history-card glass"><div class="history-card-head"><div><p class="name">${item.nama}</p><p class="meta">${item.tanggal} • ${item.waktu}</p></div><span class="id-tag">${item.id.slice(-6)}</span></div><div class="history-grid"><div class="history-item" data-edit="${item.id}|device|Device|${item.device||0}"><span class="key">Device</span><span class="value">${formatRp(item.device||0)} <i class="fas fa-pen" style="font-size:9px"></i></span></div><div class="history-item" data-edit="${item.id}|acc|Accessories|${item.acc||0}"><span class="key">Acc</span><span class="value">${formatRp(item.acc||0)} <i class="fas fa-pen" style="font-size:9px"></i></span></div><div class="history-item" data-edit="${item.id}|qoala|Qoala|${item.qoala||0}"><span class="key">Qoala</span><span class="value">${formatRp(item.qoala||0)} <i class="fas fa-pen" style="font-size:9px"></i></span></div><div class="history-item" data-edit="${item.id}|tsel|Telkomsel|${item.tsel||0}"><span class="key">Tsel</span><span class="value">${formatRp(item.tsel||0)} <i class="fas fa-pen" style="font-size:9px"></i></span></div><div class="history-item" data-edit="${item.id}|isat|Indosat|${item.isat||0}"><span class="key">Isat</span><span class="value">${formatRp(item.isat||0)} <i class="fas fa-pen" style="font-size:9px"></i></span></div><div class="history-item" data-edit="${item.id}|xl|XL|${item.xl||0}"><span class="key">XL</span><span class="value">${formatRp(item.xl||0)} <i class="fas fa-pen" style="font-size:9px"></i></span></div><div class="history-item airpods" data-edit="${item.id}|airpods|Airpods (Qty)|${item.airpods||0}"><span class="key">Airpods (Qty)</span><span class="value">${item.airpods||0} <i class="fas fa-pen" style="font-size:9px"></i></span></div></div></div>`;
        });
        c.innerHTML = html;
        c.querySelectorAll('[data-edit]').forEach(el => {
          el.onclick = () => {
            const [id, col, label, oldVal] = el.dataset.edit.split('|');
            promptEdit(id, col, label, Number(oldVal));
          };
        });
      } catch (err) { c.innerHTML = '<div class="empty-state" style="color:#ff453a">' + err.message + '</div>'; }
    }

    function promptEdit(id, col, label, oldVal) {
      Swal.fire({ ...swalDark, title: `Koreksi ${label}`, text: `Angka lama: ${oldVal}`, input: 'number', inputValue: oldVal, showCancelButton: true, confirmButtonText: 'Simpan', cancelButtonText: 'Batal' })
        .then(async (r) => {
          if (r.isConfirmed) {
            Swal.fire({ ...swalDark, title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
              await update(ref(db, `sales/${id}`), { [col]: Number(r.value) || 0 });
              Swal.fire({ ...swalDark, title: 'Sukses', icon: 'success', timer: 800, showConfirmButton: false });
              loadHistory();
            } catch (err) { Swal.fire({ ...swalDark, title: 'Error', text: err.message, icon: 'error' }); }
          }
        });
    }

    async function loadRank() {
      const c = document.getElementById('rank_container');
      c.innerHTML = '<div class="loading"><i class="fas fa-circle-notch fa-spin"></i></div>';
      try {
        const snap = await get(ref(db, 'sales'));
        const leaders = {};
        if (snap.exists()) {
          snap.forEach(child => {
            const r = child.val();
            const total = (r.device||0)+(r.acc||0)+(r.qoala||0)+(r.tsel||0)+(r.isat||0)+(r.xl||0);
            if (!leaders[r.nama]) leaders[r.nama] = { total: 0, airpods: 0 };
            leaders[r.nama].total += total;
            leaders[r.nama].airpods += (r.airpods || 0);
          });
        }
        const arr = Object.keys(leaders).map(k => ({ name: k, ...leaders[k] })).sort((a,b) => b.total - a.total);
        let html = '';
        arr.forEach((item, i) => {
          let badge = `<span style="color:${i<3?'#fff':'#48484a'}">${i + 1}</span>`;
          if (i === 0) badge = `<i class="fas fa-medal" style="color:#ffd60a"></i>`;
          if (i === 1) badge = `<i class="fas fa-medal" style="color:#aeaeb2"></i>`;
          if (i === 2) badge = `<i class="fas fa-medal" style="color:#a2734c"></i>`;
          html += `<div class="rank-card glass"><div class="rank-badge">${badge}</div><div class="rank-info"><p class="name">${item.name}</p><p class="sub"><i class="fas fa-headphones"></i> ${item.airpods} Airpods</p></div><div class="rank-total"><p class="l">Penjualan</p><p class="v">Rp ${formatRp(item.total)}</p></div></div>`;
        });
        if (!html) html = '<div class="empty-state">Belum ada data.</div>';
        c.innerHTML = html;
      } catch (err) { c.innerHTML = '<div class="empty-state" style="color:#ff453a">' + err.message + '</div>'; }
    }

    async function loadChart() {
      try {
        const snap = await get(ref(db, 'sales'));
        const monthly = {};
        const monthNames = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
        if (snap.exists()) {
          snap.forEach(child => {
            const r = child.val();
            const d = new Date(r.timestamp);
            const key = monthNames[d.getMonth()] + ' ' + d.getFullYear();
            const total = (r.device||0)+(r.acc||0)+(r.qoala||0)+(r.tsel||0)+(r.isat||0)+(r.xl||0);
            monthly[key] = (monthly[key] || 0) + total;
          });
        }
        const labels = Object.keys(monthly);
        const data = labels.map(k => monthly[k]);
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: 'Total (Rp)', data,
              backgroundColor: ctx => {
                const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 300);
                g.addColorStop(0, '#0a84ff'); g.addColorStop(1, '#0a84ff33');
                return g;
              },
              borderRadius: 8, borderSkipped: false
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#999', callback: v => v >= 1000000 ? (v/1000000) + 'Jt' : v >= 1000 ? (v/1000) + 'Rb' : v, font: { size: 10 } } },
              x: { grid: { display: false }, ticks: { color: '#999', font: { size: 10 } } }
            }
          }
        });
      } catch (err) { Swal.fire({ ...swalDark, title: 'Error', text: err.message, icon: 'error' }); }
    }

    async function exportExcel() {
      Swal.fire({ ...swalDark, title: 'Menyiapkan file...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const snap = await get(ref(db, 'sales'));
        const rows = [];
        if (snap.exists()) {
          snap.forEach(child => {
            const r = child.val();
            rows.push({
              Tanggal: r.tanggal, Waktu: r.waktu, 'Nama Staff': r.nama,
              Device: r.device||0, Accessories: r.acc||0, Qoala: r.qoala||0,
              Telkomsel: r.tsel||0, Indosat: r.isat||0, XL: r.xl||0,
              'Airpods (Qty)': r.airpods||0,
              Total: (r.device||0)+(r.acc||0)+(r.qoala||0)+(r.tsel||0)+(r.isat||0)+(r.xl||0)
            });
          });
        }
        rows.sort((a,b) => {
          const [da,ma,ya] = a.Tanggal.split('/'); const [db_,mb,yb] = b.Tanggal.split('/');
          return new Date(`${ya}-${ma}-${da} ${a.Waktu}`) - new Date(`${yb}-${mb}-${db_} ${b.Waktu}`);
        });
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Penjualan');
        XLSX.writeFile(wb, `Digimap_Penjualan_${new Date().toISOString().slice(0,10)}.xlsx`);
        Swal.close();
      } catch (err) { Swal.fire({ ...swalDark, title: 'Error', text: err.message, icon: 'error' }); }
    }

    document.getElementById('btn_login').onclick = doLogin;
    document.getElementById('btn_logout').onclick = doLogout;
    document.getElementById('btn_submit').onclick = submitForm;
    document.getElementById('btn_export').onclick = exportExcel;
    document.getElementById('limit_history').onchange = loadHistory;
    document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => switchTab(b.dataset.tab));
  </script>
</body>
</html>
